# Coolify deployment configuration for paystub-portal
version: "1"

app:
  name: paystub-portal
  description: "Portail RH — Bulletins de Salaire"

build:
  dockerfile: Dockerfile

deploy:
  port: 5000
  health_check:
    path: /api/health
    timeout: 30
  restart_policy: on-failure
  restart_retries: 3

environment:
  - PORT=5000
  - NODE_ENV=production
  - JWT_SECRET=
  - JWT_EXPIRES_IN=8h
  - DATABASE_URL=
  - PDF_DIR=./pdf
  - CSV_PATH=./csv/payslips.csv
  - CLIENT_URL=
  - SMTP_HOST=smtp.gmail.com
  - SMTP_PORT=587
  - SMTP_SECURE=false
  - SMTP_USER=
  - SMTP_PASS=
  - SMTP_FROM=noreply@ugb-crous.sn

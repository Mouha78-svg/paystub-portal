[build]
  base    = "client"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Proxy /api/* to the Express backend (hosted on Railway).
# NOTE: Netlify does not support env var interpolation in redirect "to" fields —
# update the URL below directly whenever the Railway deployment URL changes.
[[redirects]]
  from   = "/api/*"
  to     = "https://paystub-portal-production.up.railway.app/api/:splat"
  status = 200
  force  = true

# SPA fallback — let React Router handle all client-side routes.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

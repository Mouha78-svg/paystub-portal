<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Outer background circle — warm taupe matching the seal -->
  <circle cx="256" cy="256" r="252" fill="#C6AF93"/>

  <!-- Outer border ring -->
  <circle cx="256" cy="256" r="252" fill="none" stroke="#4A2E0A" stroke-width="6"/>

  <!-- Outer ring inner edge -->
  <circle cx="256" cy="256" r="218" fill="none" stroke="#4A2E0A" stroke-width="3"/>

  <!-- Inner cream circle -->
  <circle cx="256" cy="256" r="215" fill="#E2D2B5"/>

  <!-- Inner decorative ring -->
  <circle cx="256" cy="256" r="192" fill="none" stroke="#4A2E0A" stroke-width="1.5"/>

  <defs>
    <!-- Top arc: CW from left through top to right (r=234) -->
    <path id="topArc" d="M 22,256 A 234,234 0 0,1 490,256" fill="none"/>
    <!-- Bottom arc: CCW from left through bottom to right (r=234) -->
    <path id="botArc" d="M 22,256 A 234,234 0 0,0 490,256" fill="none"/>
  </defs>

  <!-- Top curved text -->
  <text font-family="Georgia, 'Times New Roman', serif" font-size="33"
        fill="#3A2108" text-anchor="middle" letter-spacing="2.5">
    <textPath href="#topArc" startOffset="50%">UNIVERSITÉ GASTON BERGER</textPath>
  </text>

  <!-- Bottom curved text -->
  <text font-family="Georgia, 'Times New Roman', serif" font-size="30"
        fill="#3A2108" text-anchor="middle" letter-spacing="2">
    <textPath href="#botArc" startOffset="50%">SAINT-LOUIS DU SÉNÉGAL</textPath>
  </text>

  <!-- Central CROUS text -->
  <text x="256" y="256" text-anchor="middle" dominant-baseline="central"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="112" font-weight="bold" fill="#2A1505" letter-spacing="5">CROUS</text>
</svg>
